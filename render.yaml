services:
  # ── Production backend + Observability surface ──────────────────────────────
  # (app.observeagents.ai + gateway.observeagents.ai)
  # The single backend: ALL APIs (OTLP ingestion and the /v1 gateway proxy) plus
  # the Observability UI served from the same origin. Real customer data only.
  # DEMO_MODE must stay false here — demo lives in the separate service below.
  - type: web
    name: ai-asset-app
    runtime: python
    buildCommand: cd dashboard && npm install && npm run build && cd .. && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
    envVars:
      # ── Product surface (build-time; Vite reads VITE_* during npm run build) ─
      # Production always builds an explicit surface — "combined" is the unset
      # fallback for local dev and the demo only, never the production default.
      - key: VITE_PRODUCT_SURFACE
        value: observability
      # ── Environment separation ──────────────────────────────────────────────
      - key: APP_ENV
        value: production
      - key: DEMO_MODE
        value: "false"
      # Domain swap: app.observeagents.ai is the canonical app URL; the apex
      # redirects to www.observeagents.ai (marketing static site). The apex
      # stays CORS-allowed via config.PUBLIC_ORIGINS during propagation.
      - key: PUBLIC_APP_URL
        value: https://app.observeagents.ai
      - key: PUBLIC_GATEWAY_URL
        value: https://gateway.observeagents.ai
      - key: PUBLIC_MARKETING_URL
        value: https://www.observeagents.ai
      - key: JWT_SECRET
        generateValue: true
      - key: GUARD_MODE
        value: observe
      - key: GATEWAY_LLM_TIMEOUT_SECS
        value: "30"
      - key: GATEWAY_ENFORCE_TIMEOUT_SECS
        value: "5"
      # Set these in the Render dashboard — never commit real keys
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: LOCAL_LLM_URL
        sync: false
      # Fernet key for encrypting per-org provider credentials (BYOK).
      # Generate: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
      # Set in Render dashboard (sync:false). Never commit the real value.
      - key: CREDENTIAL_ENCRYPTION_KEY
        sync: false
      # ── Production database (Managed Postgres) ──────────────────────────────
      # Storage defaults to SQLite on the disk above. For customer data,
      # graduate to managed Postgres: set DATABASE_URL to the connection string
      # (external provider like Neon — set it in the Render dashboard, sync:false),
      # or uncomment the databases: block at the bottom of this file and the
      # fromDatabase reference below to let Render manage it. The app detects
      # the dialect: schema auto-builds on a fresh Postgres, pooled engine,
      # legacy SQLite self-repair skips itself.
      # - key: DATABASE_URL
      #   fromDatabase:
      #     name: observeagents-db
      #     property: connectionString

  # ── Gateway console (static frontend, Gateway surface) ──────────────────────
  # Separate deployable frontend for the ObserveAgents Gateway product: the same
  # dashboard codebase built with VITE_PRODUCT_SURFACE=gateway, talking to the
  # single backend above (gateway.observeagents.ai — also the SDK traffic host).
  # One backend, one database; only the frontend build differs per surface.
  # Going live: attach a console hostname in the Render dashboard and add that
  # origin to ai-asset-app's FRONTEND_ORIGIN env var for CORS.
  - type: web
    name: observeagents-gateway-console
    runtime: static
    buildCommand: cd dashboard && npm install && npm run build
    staticPublishPath: dashboard/dist
    envVars:
      - key: VITE_PRODUCT_SURFACE
        value: gateway
      - key: VITE_API_BASE
        value: https://gateway.observeagents.ai

  # ── Marketing website (static, single-page) ─────────────────────────────────
  # Public landing site built from website/. Owns www.observeagents.ai (attach
  # in the Render dashboard); the apex redirects to www. The app's canonical
  # address is app.observeagents.ai.
  - type: web
    name: observeagents-website
    runtime: static
    buildCommand: cd website && npm install && npm run build
    staticPublishPath: website/dist

  # ── Public demo (demo.observeagents.ai) ─────────────────────────────────────
  # Separate service + separate disk/DB. No login, synthetic data, read-only.
  # This is the ONLY place DEMO_MODE=true is set.
  # Ships the SAME product surface as the production app (observability) so the
  # demo's navigation matches app.observeagents.ai exactly. Demo-only behavior
  # (no-login, synthetic data, read-only, the DemoDashboard landing) is runtime,
  # gated by DEMO_MODE — independent of the build-time surface.
  - type: web
    name: ai-asset-demo
    runtime: python
    buildCommand: cd dashboard && npm install && npm run build && cd .. && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    disk:
      name: sqlite-data-demo
      mountPath: /data
      sizeGB: 1
    envVars:
      # ── Product surface (build-time) — match the production app's nav ───────
      - key: VITE_PRODUCT_SURFACE
        value: observability
      # ── Environment separation ──────────────────────────────────────────────
      - key: APP_ENV
        value: demo
      - key: DEMO_MODE
        value: "true"
      - key: PUBLIC_APP_URL
        value: https://demo.observeagents.ai
      - key: PUBLIC_GATEWAY_URL
        value: https://demo.observeagents.ai
      - key: PUBLIC_MARKETING_URL
        value: https://www.observeagents.ai
      - key: JWT_SECRET
        generateValue: true
      - key: GUARD_MODE
        value: observe
      # Demo never makes real provider calls (mutations are blocked), so no real
      # API keys are configured. A throwaway encryption key keeps boot happy.
      - key: CREDENTIAL_ENCRYPTION_KEY
        sync: false

# ── Managed Postgres (deliberately commented out) ─────────────────────────────
# Uncomment together with ai-asset-app's DATABASE_URL fromDatabase reference
# above to have Render provision and wire the database. Kept inactive so a
# Blueprint sync can never silently provision a paid database — enabling it is
# an explicit decision.
# databases:
#   - name: observeagents-db
#     plan: basic-256mb
#     postgresMajorVersion: "16"
