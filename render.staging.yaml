services:
  # ── Staging app (isolated from production) ───────────────────────────────────
  # Deploys branch: claude/observeagents-review-refactor-aq8f0s
  # Separate service name, separate disk name — cannot collide with ai-asset-app.
  # No custom domains. Accessible only via Render-generated *.onrender.com URL.
  # PUBLIC_* vars left as sync:false — fill them with the actual onrender.com URL
  # after Render assigns it (visible in the service dashboard under Settings).
  - type: web
    name: ai-asset-app-staging
    runtime: python
    branch: claude/observeagents-review-refactor-aq8f0s
    buildCommand: cd dashboard && npm install && npm run build && cd .. && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    disk:
      name: sqlite-data-staging
      mountPath: /data
      sizeGB: 1
    envVars:
      # ── Environment separation ──────────────────────────────────────────────
      - key: APP_ENV
        value: development
      - key: DEMO_MODE
        value: "false"
      - key: DEBUG
        value: "true"
      - key: GUARD_MODE
        value: observe
      - key: GATEWAY_LLM_TIMEOUT_SECS
        value: "30"
      - key: GATEWAY_ENFORCE_TIMEOUT_SECS
        value: "5"
      # ── Public URLs — fill after Render assigns the onrender.com hostname ───
      # Example: https://ai-asset-app-staging.onrender.com
      # Do not use any observeagents.ai domain here.
      - key: PUBLIC_APP_URL
        sync: false
      - key: PUBLIC_GATEWAY_URL
        sync: false
      - key: PUBLIC_MARKETING_URL
        sync: false
      # ── Secrets — set manually in Render dashboard after Blueprint sync ─────
      - key: JWT_SECRET
        sync: false
      - key: CREDENTIAL_ENCRYPTION_KEY
        sync: false
      - key: ADMIN_SEED_PASSWORD
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: LOCAL_LLM_URL
        sync: false

  # ── Staging demo (isolated from production demo) ─────────────────────────────
  # Separate service name and disk — cannot collide with ai-asset-demo.
  # No custom domains. No real provider keys needed (demo uses synthetic data).
  - type: web
    name: ai-asset-demo-staging
    runtime: python
    branch: claude/observeagents-review-refactor-aq8f0s
    buildCommand: cd dashboard && npm install && npm run build && cd .. && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    disk:
      name: sqlite-data-demo-staging
      mountPath: /data
      sizeGB: 1
    envVars:
      # ── Environment separation ──────────────────────────────────────────────
      - key: APP_ENV
        value: demo
      - key: DEMO_MODE
        value: "true"
      - key: DEBUG
        value: "true"
      - key: GUARD_MODE
        value: observe
      # ── Public URLs — fill after Render assigns the onrender.com hostname ───
      # Example: https://ai-asset-demo-staging.onrender.com
      - key: PUBLIC_APP_URL
        sync: false
      - key: PUBLIC_GATEWAY_URL
        sync: false
      - key: PUBLIC_MARKETING_URL
        sync: false
      # ── Secrets — set manually in Render dashboard after Blueprint sync ─────
      - key: JWT_SECRET
        sync: false
      - key: CREDENTIAL_ENCRYPTION_KEY
        sync: false
